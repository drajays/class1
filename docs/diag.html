<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Diag</title>
<style>
  body { font-family: -apple-system, sans-serif; font-size: 22px; line-height: 1.6; padding: 16px; background: #fff; color: #000; }
  div { word-break: break-all; border-bottom: 1px solid #ccc; padding: 6px 0; }
  b { color: #06c; }
</style>
</head>
<body>
  <div><b>innerWidth:</b> <span id="iw"></span></div>
  <div><b>innerHeight:</b> <span id="ih"></span></div>
  <div><b>devicePixelRatio:</b> <span id="dpr"></span></div>
  <div><b>screen.width x height:</b> <span id="sw"></span></div>
  <div><b>visualViewport.width:</b> <span id="vvw"></span></div>
  <div><b>visualViewport.scale:</b> <span id="vvs"></span></div>
  <div><b>navigator.standalone:</b> <span id="standalone"></span></div>
  <div><b>display-mode standalone:</b> <span id="dm"></span></div>
  <div><b>documentElement clientWidth:</b> <span id="dcw"></span></div>
  <div><b>userAgent:</b> <span id="ua"></span></div>
<script>
function update() {
  document.getElementById('iw').textContent = window.innerWidth;
  document.getElementById('ih').textContent = window.innerHeight;
  document.getElementById('dpr').textContent = window.devicePixelRatio;
  document.getElementById('sw').textContent = screen.width + ' x ' + screen.height;
  document.getElementById('vvw').textContent = window.visualViewport ? window.visualViewport.width : 'n/a';
  document.getElementById('vvs').textContent = window.visualViewport ? window.visualViewport.scale : 'n/a';
  document.getElementById('standalone').textContent = navigator.standalone;
  document.getElementById('dm').textContent = window.matchMedia('(display-mode: standalone)').matches;
  document.getElementById('dcw').textContent = document.documentElement.clientWidth;
  document.getElementById('ua').textContent = navigator.userAgent;
}
update();
window.addEventListener('resize', update);
setTimeout(update, 1000);
</script>
</body>
</html>

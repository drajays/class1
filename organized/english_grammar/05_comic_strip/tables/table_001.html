<table border=1 style='margin: auto; word-wrap: break-word;'><tr><td style='text-align: center; word-wrap: break-word;'>“Look!” I said. “My doughnuts are delicious.”</td><td style='text-align: center; word-wrap: break-word;'>“I got it from the best bakery in town.”</td><td style='text-align: center; word-wrap: break-word;'>I showed it to my sister.</td></tr><tr><td style='text-align: center; word-wrap: break-word;'>“She wanted to eat all my doughnuts alone”.</td><td style='text-align: center; word-wrap: break-word;'>I said, “No! ” But my mother asked me to share.</td><td style='text-align: center; word-wrap: break-word;'>I agreed and we enjoyed eating the doughnuts together.</td></tr></table>
